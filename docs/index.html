<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="/Mir/favicon.ico">
  <link rel="mask-icon" href="/Mir/favicon.svg" color="#333333">
  <title>Mir</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: #fff;
      color: #1d1d1f;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #000; color: #f5f5f7; }
      .btn { background: #f5f5f7; color: #000; }
      .btn:hover { background: #e8e8ed; }
    }
    .hero {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .hero p {
      font-size: 1.25rem;
      line-height: 1.5;
      color: #6e6e73;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      font-size: 1.05rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 980px;
      background: #1d1d1f;
      color: #fff;
      transition: background 0.2s;
    }
    .btn:hover { background: #424245; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Mir</h1>
    <p>A Swift library for building modern apps.</p>
    <a href="documentation/mir/" class="btn">View Documentation</a>
  </div>
</body>
</html>
